<html>
  <head>
    <base target="_top">
    <?!= inputLib ?>
  </head>
  <body>
    <div class="input-group">
      <input type="file" class="form-control" id="files" aria-describedby="inputGroupFileAddon" aria-label="Upload" name="files[]" accept=".csv,text/csv">
      <button class="btn btn-outline-secondary" type="button" id="inputGroupFileAddon">読み込み</button>
    </div>
    <table class="table table-hover mt-2" id="taskTable">
        <colgroup>
            <col class="col-1">
            <col class="col-8">
            <col class="col-1">
            <col class="col-2">
        </colgroup>
        <thead>
          <tr>
            <th scope="col">No.</th>
            <th scope="col">タスク名</th>
            <th scope="col">工数</th>
            <th scope="col">進捗表</th>
          </tr>
        </thead>
        <tbody>
        </tbody>
    </table>
    <!-- <div class="container mt-2">
    </div> -->
    <div class="d-flex justify-content-end"> <!-- このdivを追加 -->
      <button type="button" class="btn btn-outline-primary mx-2" id="createReport">日報作成</button>
      <button type="button" class="btn btn-outline-success mx-2" id="createProgress">進捗表を新規作成</button>
      <button type="button" class="btn btn-outline-secondary mx-2"id="inputGroupFileAddon" onclick="google.script.host.close()">閉じる</button>
    </div>

    <!-- Spinnerを追加 -->
    <div id="overlay" style="display:none;position:fixed;top:0;left:0;width:100%;height:100%;background-color:rgba(0,0,0,0.5);">
      <div class="d-flex justify-content-center align-items-center" style="height:100%;">
        <!-- <div class="spinner-border text-light" role="status"> -->
        <div class="spinner-border text-light" style="width: 5rem; height: 5rem;" role="status">
          <span class="visually-hidden">Loading...</span>
        </div>
      </div>
    </div>


    <script>
    function formatDateToISO(date) {
        var year = date.getFullYear();
        var month = ('0' + (date.getMonth() + 1)).slice(-2); // +1 because months are 0-based in JS.
        var day = ('0' + date.getDate()).slice(-2);
        return year + '-' + month + '-' + day;
    }
    function formatDateToSlash(date) {
        var year = date.getFullYear();
        var month = ('0' + (date.getMonth() + 1)).slice(-2); // +1 because months are 0-based in JS.
        var day = ('0' + date.getDate()).slice(-2);
        return year + '/' + month + '/' + day;
    }

    function csvToArray(csv) {
        var lines = csv.trim().split("\n");
        var result = [];
        for (var i = 0; i < lines.length; i++) {
          var arrayData = lines[i].split(",").map(item => item.trim());
          // 二重引用符を取り除く処理
          arrayData = arrayData.map(item => {
              if (item.startsWith('"') && item.endsWith('"')) {
                  return item.slice(1, -1);
              }
              let match = item.match(/(\d{4})\/(\d{1,2})\/(\d{1,2})/);
              if (match) {
                const year = match[1];
                const month = match[2].padStart(2, "0");
                const day = match[3].padStart(2, "0");
                return `${year}-${month}-${day}`;
              }
              return item;
          });
          result.push(arrayData);
        }
        return result;
    }

    const buttonIds = ['inputGroupFileAddon', 'createReport', 'createProgress'];
    // ファイルの選択状態をチェックしてボタンの活性/非活性を制御する関数
    function checkFileSelection() {
        var fileInput = document.getElementById('files');
        var btn = document.getElementById('inputGroupFileAddon');
        if (fileInput.files.length === 0) {
            btn.disabled = true;
        } else {
            btn.disabled = false;
        }
    }
    // ページの読み込み時にボタンの状態をチェック
    window.onload = checkFileSelection;

    // ファイルの選択状態が変わったときにボタンの状態をチェック
    document.getElementById('files').addEventListener('change', checkFileSelection);

    // テーブル内の工数を合計する関数
    function sumHours() {
        let total = 0;
        // :first-child は子要素の一番最初に適応
        // :last-child は子要素の一番最後に適応
        // :nth-last-child(n) は子要素の最後からn番目に適応
        const hoursElements = document.querySelectorAll("#taskTable tbody td:nth-last-child(2)");
        
        hoursElements.forEach(element => {
            total += parseFloat(element.innerText);
        });

        return total.toFixed(2);  // 小数点第2位までの値を返す
    }

    // 既存のテーブルに合計行を追加
    function addTotalRow() {
        const total = sumHours();
        const tbody = document.querySelector("#taskTable tbody");
        const newRow = document.createElement("tr");
        newRow.innerHTML = `
            <th scope="row" colspan="2">合計</th>
            <td>${total}</td>
        `;
        tbody.appendChild(newRow);
    }

    
    function createTableBody(taskList){
        const tableBody = document.querySelector('#taskTable tbody');
        tableBody.innerHTML = '';
        taskList.forEach((task, index) => {
            const row = document.createElement('tr');
            // インデックスを基に行番号を作成
            const th = document.createElement('th');
            th.setAttribute('scope', 'row');
            th.innerText = index + 1;

            // 1つ目の要素をセルに追加
            const tdName = document.createElement('td');
            tdName.innerText = task[0];

            // 2つ目の要素をセルに追加
            const tdTime = document.createElement('td');
            tdTime.innerText = task[1];

            // 3つ目の要素をセルに追加
            const tdTable = document.createElement('td');
            if(task[2] == true){
              tdTable.innerHTML = '<i class="bi bi-check-circle" style="color: #20c997;"></i>';

            }else{
              tdTable.innerHTML = '<i class="bi bi-dash-lg"></i>';
            }

            // セルを行に追加
            row.appendChild(th);
            row.appendChild(tdName);
            row.appendChild(tdTime);
            row.appendChild(tdTable);

            // 行をテーブルに追加
            tableBody.appendChild(row);
        });
    }

    // DOMが完全に読み込まれた後に実行されるコード
    let taskList = [["-",0.00,false], ["-",0.00,false], ["-",0.00,false], ["-",0.00,false]];
    document.addEventListener('DOMContentLoaded', function() {
      // let taskList = [["-",0.00,false], ["-",0.00,false], ["-",0.00,false], ["-",0.00,false]];
      createTableBody(taskList);
      buttonIds.forEach(id => {
          const btn = document.getElementById(id);
          btn.disabled = true; // ボタンを無効化
      });
    });

    document.getElementById('inputGroupFileAddon').addEventListener('click', function() {
      // console.log("TEST");
      const csvType = '<?= csvType ?>';
      // console.log(csvType);
      
      buttonIds.forEach(id => {
          const btn = document.getElementById(id);
          btn.disabled = true; // ボタンを無効化
      });
      var fileInput = document.getElementById('files');
      var file = fileInput.files[0];

      var today = new Date();
      var todayToISO = formatDateToISO(today);
      console.log(todayToISO);
      var fileName = todayToISO + "_" + file.name;

      var reader = new FileReader();
      reader.onloadend = function(e) {
        var content = reader.result;

        // base64部分のみを取得
        var base64Data = content.split(',')[1];
        // base64をデコードしてUint8Arrayを取得
        var decodedData = Uint8Array.from(atob(base64Data), c => c.charCodeAt(0));
        const encoding = Encoding.detect(decodedData);
        // console.log(encoding);
        var charArray = Encoding.convert(decodedData, {
          from: encoding,
          to: 'UNICODE',
          type: 'string'
          });

        var csvArraryData = csvToArray(charArray);
        console.log(csvArraryData);
        let index = csvArraryData[0].indexOf(todayToISO);
        taskList.length = 0; // taskListを空にする
        for(i=1;i<csvArraryData.length;i++){
          if(!csvArraryData[i][index]) continue;
          taskList.push([csvArraryData[i][0],csvArraryData[i][index]]);
        }
        createTableBody(taskList);
  
        // 関数を呼び出して合計行を追加
        // addTotalRow();

        // Spinnerを表示
        document.getElementById('overlay').style.display = 'block';

        if(csvType === 'csvInput'){
          google.script.run.withSuccessHandler(function (res){
            taskList = res;
            createTableBody(taskList);
            addTotalRow();
            console.log("taskList123",taskList);
            // await new Promise(r => setTimeout(r, 10000)); // 3秒間のスリープ
            document.getElementById('overlay').style.display = 'none';
            buttonIds.forEach(id => {
                const btn = document.getElementById(id);
                btn.disabled = false; 
            });

            // google.script.host.close();
          }).uploadFile({content,fileName,taskList});
        };

        if(csvType === 'csvOutput'){
          google.script.run.withSuccessHandler(function (){
            document.getElementById('overlay').style.display = 'none';
            buttonIds.forEach(id => {
                const btn = document.getElementById(id);
                btn.disabled = false; 
            });
          }).csvCreateReport({taskList});
        };     
      }
      reader.readAsDataURL(file);
    });

    document.getElementById('createReport').addEventListener('click', function() {
      console.log('createReport',taskList);
      buttonIds.forEach(id => {
          const btn = document.getElementById(id);
          btn.disabled = true; // ボタンを無効化
      });
      // Spinnerを表示
      document.getElementById('overlay').style.display = 'block';
          google.script.run.withSuccessHandler(function (){
            document.getElementById('overlay').style.display = 'none';
            buttonIds.forEach(id => {
                const btn = document.getElementById(id);
                btn.disabled = false; 
            });
          }).csvCreateReport({taskList});
          console.log('csvCreateReport');
    });

    document.getElementById('createProgress').addEventListener('click', function() {
      console.log('createProgress',taskList);
      buttonIds.forEach(id => {
          const btn = document.getElementById(id);
          btn.disabled = true; // ボタンを無効化
      });
      // Spinnerを表示
      document.getElementById('overlay').style.display = 'block';
          google.script.run.withSuccessHandler(function (res){
            taskList = res;
            createTableBody(taskList);
            addTotalRow();
            document.getElementById('overlay').style.display = 'none';
            buttonIds.forEach(id => {
                const btn = document.getElementById(id);
                btn.disabled = false; 
            });
          }).csvCreateProgress({taskList});
    });

    </script>

  </body>
</html>
