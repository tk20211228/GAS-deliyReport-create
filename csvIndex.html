<!DOCTYPE html>

<html>
  <head>
    <base target="_top">
    <?!= inputLib ?>
  </head>
  <body>
    <!-- Spinnerを追加 -->
    <div id="overlay" style="display:none;position:fixed;top:0;left:0;width:100%;height:100%;background-color:rgba(0,0,0,0.5);">
      <div class="d-flex justify-content-center align-items-center" style="height:100%;">
        <!-- <div class="spinner-border text-light" role="status"> -->
        <div class="spinner-grow text-light" style="width: 9rem; height: 9rem;" role="status">
          <span class="visually-hidden">Loading...</span>
        </div>
      </div>
    </div>

    <div class="m-2" style="background: #edf0ff;">
       <div class="container-fluid">
        <div class="m-2 row d-flex">
          <form>
            <div class="col-6 mt-2 d-flex align-items-center">
              <label class="col-sm-2 col-form-label">差出人</label>
              <div class="col-sm-10">
                <input type="text" class="form-control" id="myEmail" value="<?= bodyItem.userEmail ?>" readonly>
              </div>
            </div>
            <div class="col-6 mt-2 d-flex align-items-center">
              <label class="col-sm-2 col-form-label">宛先</label>
              <div class="col-sm-10">
                <input type="text" class="form-control" id="destination" value="<?= bodyItem.destination ?>" readonly>
              </div>
            </div>
            <div class="col-6 mt-2 d-flex align-items-center">
              <label class="col-sm-2 col-form-label">件名</label>
              <div class="col-sm-10">
                <input type="text" class="form-control" id="subject" value="<?= bodyItem.subject ?>">
              </div>
            </div>
            <div class="col-12 mt-2">
              <textarea class="form-control form-control-lg" id="report" style="height:570px"><?= bodyItem.reportBody ?></textarea>
              <button id="createGmail" type="button" class="btn btn-outline-primary m-2"> 
                Gmailの下書きに出力する
              </button>
              <button type="button" class="btn btn-outline-success m-2" id="textcope" >テキストを全てコピーする</button>

              <button type="button" class="btn btn-outline-secondary m-2" onclick="google.script.host.close()">閉じる</button>
            </div>
          </form>
       </div>
     </div>
    </div>
    <script>
      document.getElementById('createGmail').addEventListener('click',function(){
        const body    = document.getElementsByTagName("textarea")[0].value;
        const subject = document.getElementById('subject').value;
        const to      = document.getElementById('destination').value;

        document.getElementById('overlay').style.display = 'block';
        var buttons = document.querySelectorAll('.btn')
        buttons.forEach(function (button) {
          button.setAttribute('disabled', 'disabled');
        });
                
        // console.log(body,subject,to);
        google.script.run.withSuccessHandler(
          // async 
          function(){
          // await new Promise(r => setTimeout(r, 10000)); // 3秒間のスリープ
          document.getElementById('overlay').style.display = 'none';
          var buttons = document.querySelectorAll('.btn');
          buttons.forEach(function (button) {
            button.removeAttribute('disabled');
          });
          // google.script.host.close();

          }).createGmail(to,subject,body);
      })

      document.getElementById('textcope').addEventListener('click',function(){
        const text = document.getElementsByTagName("textarea")[0];
        text.select();
        document.execCommand("copy");
      })
    </script>

    </div>
  </body>
  
</html>
