<html>
  <head>
    <base target="_top">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/encoding-japanese/1.0.30/encoding.min.js"></script>
  </head>
  <body>
    <div class="input-group">
      <input type="file" class="form-control" id="files" aria-describedby="inputGroupFileAddon" aria-label="Upload" name="files[]" accept=".csv,text/csv">
      <button class="btn btn-outline-secondary" type="button" id="inputGroupFileAddon">実行</button>
    </div>

    <!-- Spinnerを追加 -->
    <div id="overlay" style="display:none;position:fixed;top:0;left:0;width:100%;height:100%;background-color:rgba(0,0,0,0.5);">
      <div class="d-flex justify-content-center align-items-center" style="height:30%;">
        <div class="spinner-border text-light" role="status">
          <span class="visually-hidden">Loading...</span>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js" integrity="sha384-MrcW6ZMFYlzcLA8Nl+NtUVF0sA7MsXsP1UyJoMp4YLEuNSfAP+JcXn/tWtIaxVXM" crossorigin="anonymous"></script>

    <script>
    function formatDate(date) {
        var year = date.getFullYear();
        var month = ('0' + (date.getMonth() + 1)).slice(-2); // +1 because months are 0-based in JS.
        var day = ('0' + date.getDate()).slice(-2);
        return year + '-' + month + '-' + day;
    }

    function csvToArray(csv) {
        var lines = csv.trim().split("\n");
        var result = [];
        for (var i = 0; i < lines.length; i++) {
          var arrayData = lines[i].split(",").map(item => item.trim());
          // 二重引用符を取り除く処理
          arrayData = arrayData.map(item => {
              if (item.startsWith('"') && item.endsWith('"')) {
                  return item.slice(1, -1);
              }
              return item;
          });
          result.push(arrayData);
        }
        return result;
    }

    // ファイルの選択状態をチェックしてボタンの活性/非活性を制御する関数
    function checkFileSelection() {
        var fileInput = document.getElementById('files');
        var btn = document.getElementById('inputGroupFileAddon');
        
        if (fileInput.files.length === 0) {
            btn.disabled = true;
        } else {
            btn.disabled = false;
        }
    }
    // ページの読み込み時にボタンの状態をチェック
    window.onload = checkFileSelection;

    // ファイルの選択状態が変わったときにボタンの状態をチェック
    document.getElementById('files').addEventListener('change', checkFileSelection);

    document.getElementById('inputGroupFileAddon').addEventListener('click', function() {
      // console.log("TEST");
      
      var btn = document.getElementById('inputGroupFileAddon');
      btn.disabled = true; // ボタンを無効化

      var fileInput = document.getElementById('files');
      var file = fileInput.files[0];

      var today = new Date();
      var fileName = formatDate(today) + "_" + file.name;

      var reader = new FileReader();
      reader.onloadend = function(e) {
        var content = reader.result;
        var csvfile = e.target.result;
        var uint8Array = new Uint8Array(csvfile);
        const encoding = Encoding.detect(uint8Array);
        // console.log(encoding);
        var charArray = Encoding.convert(uint8Array, {
          from: encoding,
          to: 'UNICODE',
          type: 'string'
          });

        var csvArraryData = csvToArray(charArray);

        console.log("csvArraryData",csvArraryData);

        console.log(content);
        console.log(csvfile);
        console.log(fileName);

        // Spinnerを表示
        document.getElementById('overlay').style.display = 'block';

        google.script.run.withSuccessHandler(function(){

          // 処理が完了したら、Spinnerを非表示にし、画面を閉じる
          // google.script.host.close();
          // await new Promise(r => setTimeout(r, 2000)); // 3秒間のスリープ
          document.getElementById('overlay').style.display = 'none';
          btn.disabled = false; // ボタンを有効化
          // google.script.host.close();

        }).uploadFileToDrive(content,fileName);



      }
      // reader.readAsArrayBuffer(file);
      reader.readAsDataURL(file);
    });
    </script>

  </body>
</html>
