<html>
  <head>
    <base target="_top">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
  </head>
  <body>
    <div class="input-group">
      <input type="file" class="form-control" id="files" aria-describedby="inputGroupFileAddon" aria-label="Upload" name="files[]" >
      <button class="btn btn-outline-secondary" type="button" id="inputGroupFileAddon">Button</button>
    </div>

    <!-- Spinnerを追加 -->
    <div id="overlay" style="display:none;position:fixed;top:0;left:0;width:100%;height:100%;background-color:rgba(0,0,0,0.5);">
      <div class="d-flex justify-content-center align-items-center" style="height:30%;">
        <div class="spinner-border text-light" role="status">
          <span class="visually-hidden">Loading...</span>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js" integrity="sha384-MrcW6ZMFYlzcLA8Nl+NtUVF0sA7MsXsP1UyJoMp4YLEuNSfAP+JcXn/tWtIaxVXM" crossorigin="anonymous"></script>

    <script>
    function formatDate(date) {
        var year = date.getFullYear();
        var month = ('0' + (date.getMonth() + 1)).slice(-2); // +1 because months are 0-based in JS.
        var day = ('0' + date.getDate()).slice(-2);
        return year + '-' + month + '-' + day;
    }

      document.getElementById('inputGroupFileAddon').addEventListener('click', function() {
        var btn = document.getElementById('inputGroupFileAddon');
        btn.disabled = true; // ボタンを無効化

        var fileInput = document.getElementById('files');
        var file = fileInput.files[0];
        var today = new Date();

        var fileName = formatDate(today) + "_" + file.name;
        var reader = new FileReader();
        reader.onloadend = function(e) {
         var content = reader.result;

          // Spinnerを表示
          document.getElementById('overlay').style.display = 'block';

          google.script.run.withSuccessHandler(function(){
            // 処理が完了したら、Spinnerを非表示にし、画面を閉じます
            document.getElementById('overlay').style.display = 'none';
            google.script.host.close();
          }).uploadFileToDrive(content, fileName);
        }
        reader.readAsDataURL(file);
      });
    </script>

  </body>
</html>
